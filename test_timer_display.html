<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Court Timer — Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Times New Roman', Times, serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Stage ── */
  .stage {
    width: calc(100% - 120px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
  }

  /* ── Single mode: full width ── */
  .stage.single .timer-wrap { flex: 1; }

  /* ── Multi mode: fill row until 3, then wrap ── */
  .stage.multi {
    flex-wrap: wrap;
    align-items: stretch;
  }
  .stage.multi .timer-wrap {
    flex: 1;
    min-width: 0;
    container-type: inline-size;
    container-name: timerbox;
  }
  /* Lock to 3-per-row only when 3+ timers */
  .stage.multi3up .timer-wrap {
    flex: 0 0 calc(33.333% - 42px);
  }

  /* ── Timer wrap ── */
  .timer-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pulse-ring {
    position: absolute;
    inset: -16px;
    border-radius: 28px;
    border: 8px solid transparent;
    pointer-events: none;
    opacity: 0;
  }

  .pulse-ring.warning { border-color: #f5c518; animation: pulse-warning 1.2s ease-in-out infinite; }
  .pulse-ring.danger  { border-color: #e03030; animation: pulse-danger  0.7s ease-in-out infinite; }

  @keyframes pulse-warning { 0%,100%{opacity:0;transform:scale(1)} 50%{opacity:.85;transform:scale(1.02)} }
  @keyframes pulse-danger  { 0%,100%{opacity:0;transform:scale(1)} 50%{opacity:1;transform:scale(1.03)} }

  /* ── Display box ── */
  .display {
    position: relative;
    width: 100%;
    background: #0a0a0a;
    border: 5px solid #222;
    border-radius: 20px;
    padding: 2cqw 3cqw;
    text-align: center;
    transition: border-color 0.4s;
  }

  .display.warning { border-color: #f5c518; }
  .display.danger  { border-color: #e03030; }

  /* ── Single mode text sizes ── */
  .stage.single .role-label { font-size: 2.5vw; }
  .stage.single .sub-label  { font-size: 4.5vw; }
  .stage.single .time       { font-size: 22vw; }

  /* ── Multi mode: text scales to container width, works for any count ── */
  @container timerbox (min-width: 0px) {
    .role-label { font-size: 5cqw; }
    .sub-label  { font-size: 8cqw; }
    .time       { font-size: 38cqw; }
  }

  .role-label {
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 0.3vw;
  }

  .sub-label {
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 0.4vw;
  }

  .time {
    line-height: 1;
    letter-spacing: 0.03em;
    color: #00e000;
    transition: color 0.4s;
  }

  /* ── Color states ── */
  .display.text-warning .time { color: #f5c518; }
  .display.text-danger  .time { color: #e03030; }
  .display.warning .time { color: #f5c518; }
  .display.danger  .time { color: #e03030; }

  .display.expired .time { animation: expired-flash 0.6s step-start infinite; }
  @keyframes expired-flash { 0%,49%{opacity:1} 50%,100%{opacity:0} }

  .display.warn-text-flash .time  { animation: warn-color-flash  0.7s ease-in-out infinite; }
  .display.danger-text-flash .time{ animation: danger-color-flash 0.7s ease-in-out infinite; }
  .display.warn-strobe .time      { animation: warn-strobe        0.25s step-start infinite; }
  .display.danger-strobe .time    { animation: danger-strobe      0.25s step-start infinite; }

  @keyframes warn-color-flash   { 0%,100%{color:#f5c518} 50%{color:#fff} }
  @keyframes danger-color-flash { 0%,100%{color:#e03030} 50%{color:#fff} }
  @keyframes warn-strobe        { 0%,49%{color:#f5c518} 50%,100%{color:#fff700} }
  @keyframes danger-strobe      { 0%,49%{color:#e03030} 50%,100%{color:#ff0000} }

  #sizer {
    position: fixed;
    bottom: 4px;
    right: 6px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    font-family: monospace;
    pointer-events: none;
  }

  .role-label, .sub-label, .time {
    transition: opacity 0.2s ease-in, transform 0.2s ease-in;
  }
  .display.text-fading .role-label,
  .display.text-fading .sub-label,
  .display.text-fading .time {
    opacity: 0;
    transform: translateY(-12px);
  }
  .display.text-entering .role-label,
  .display.text-entering .sub-label,
  .display.text-entering .time {
    opacity: 0;
    transform: translateY(12px);
    transition: none;
  }
</style>
</head>
<body>
<div class="stage single" id="stage"></div>
<div id="sizer"></div>

<script>
  function fmt(s) {
    s = Math.floor(Math.max(0, s));
    return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
  }

  function getRemaining(t) {
    if (!t) return 0;
    const base = t.remainingAtStart ?? t.remaining ?? 0;
    if (!t.running || !t.startedAt) return Math.floor(Math.max(0, base));
    return Math.floor(Math.max(0, base - (Date.now() - t.startedAt) / 1000));
  }

  function applyClasses(dispEl, ringEl, t, state) {
    const warnBorderOn      = state.warnBorderOn      !== false;
    const dangerBorderOn    = state.dangerBorderOn    !== false;
    const warnPulseOn       = state.warnPulseOn       === true;
    const warnTextFlashOn   = state.warnTextFlashOn   === true;
    const warnStrobeOn      = state.warnStrobeOn      === true;
    const pulseOn           = state.pulseOn           === true;
    const blinkOn           = state.blinkOn           === true;
    const dangerTextFlashOn = state.dangerTextFlashOn === true;
    const dangerStrobeOn    = state.dangerStrobeOn    === true;
    const warnAt            = t.warnAt ?? -1;
    const rem               = getRemaining(t);
    const isDanger          = rem <= 0;
    const isWarning         = !isDanger && warnAt >= 0 && rem <= warnAt;

    dispEl.classList.remove('warning','danger','text-warning','text-danger','expired',
      'warn-text-flash','danger-text-flash','warn-strobe','danger-strobe');
    ringEl.classList.remove('warning','danger');
    ringEl.style.opacity = '0';

    if (isDanger) {
      dispEl.classList.add('text-danger');
      if (dangerBorderOn)     dispEl.classList.add('danger');
      if (blinkOn)            dispEl.classList.add('expired');
      if (dangerTextFlashOn)  dispEl.classList.add('danger-text-flash');
      if (dangerStrobeOn)     dispEl.classList.add('danger-strobe');
      if (pulseOn) { ringEl.classList.add('danger'); ringEl.style.opacity = '1'; }
    } else if (isWarning) {
      dispEl.classList.add('text-warning');
      if (warnBorderOn)    dispEl.classList.add('warning');
      if (warnTextFlashOn) dispEl.classList.add('warn-text-flash');
      if (warnStrobeOn)    dispEl.classList.add('warn-strobe');
      if (warnPulseOn)     { ringEl.classList.add('warning'); ringEl.style.opacity = '1'; }
    }

    return { rem, fmt: fmt(rem) };
  }

  function buildTimerCard(id) {
    const wrap = document.createElement('div');
    wrap.className = 'timer-wrap';
    wrap.dataset.id = id;
    wrap.innerHTML = `
      <div class="pulse-ring" id="ring-${id}"></div>
      <div class="display" id="display-${id}">
        <div class="role-label" id="role-${id}"></div>
        <div class="sub-label" id="sub-${id}">Time Remaining:</div>
        <div class="time" id="time-${id}">00:00</div>
      </div>`;
    return wrap;
  }

  let renderedIds = [];
  let _fadePending = false;

  function updateCardText(id, t, state) {
    if (!t) return; // guard against undefined timer
    const dispEl = document.getElementById('display-' + id);
    const ringEl = document.getElementById('ring-'    + id);
    const timeEl = document.getElementById('time-'    + id);
    const roleEl = document.getElementById('role-'    + id);
    const subEl  = document.getElementById('sub-'     + id);
    if (!dispEl || !ringEl || !timeEl || !roleEl || !subEl) return;
    const { fmt: timeStr } = applyClasses(dispEl, ringEl, t, state);
    timeEl.textContent = timeStr;
    roleEl.textContent = t.label;
    roleEl.style.display = state.showRole === false ? 'none' : '';
    subEl.textContent  = state.subLabel || 'Time Remaining:';
    subEl.style.display = state.showSubLabel === false ? 'none' : '';
  }

  function loadAndRender() {
    try {
      const raw = localStorage.getItem('test_courtTimerState');
      if (!raw) return;
      const state = JSON.parse(raw);
      if (!state || !state.timers) return;

      const stage     = document.getElementById('stage');
      const multiMode = state.multiMode === true;
      const rawIds    = multiMode
        ? (state.multiTimers || [state.displayed])
        : [state.displayed];
      // Filter out any indices that don't have a corresponding timer
      const showIds = rawIds.filter(id => id != null && state.timers[id] != null);
      if (showIds.length === 0) return;

      const n = showIds.length;
      const newKey = showIds.join(',');

      // If the set of displayed timers changed, rebuild cards
      if (newKey !== renderedIds.join(',')) {
        if (_fadePending) return;

        const smooth = state.smoothTransition === true;

        if (!smooth) {
          // Hard cut — just swap instantly
          stage.className = 'stage ' + (multiMode && n > 1 ? 'multi' : 'single');
          if (multiMode && n >= 3) stage.classList.add('multi3up');
          stage.innerHTML = '';
          showIds.forEach(id => stage.appendChild(buildTimerCard(id)));
          renderedIds = [...showIds];
          showIds.forEach(id => {
            const t = state.timers[id];
            if (t) updateCardText(id, t, state);
          });
          return;
        }

        _fadePending = true;

        // Update stage class immediately (layout doesn't change visually)
        stage.className = 'stage ' + (multiMode && n > 1 ? 'multi' : 'single');
        if (multiMode && n >= 3) stage.classList.add('multi3up');

        // Fade out existing text first
        stage.querySelectorAll('.display').forEach(d => d.classList.add('text-fading'));

        setTimeout(() => {
          // Always rebuild cards so the correct IDs are in the DOM
          stage.innerHTML = '';
          showIds.forEach(id => stage.appendChild(buildTimerCard(id)));
          renderedIds = [...showIds];

          // Populate new cards while still at opacity 0
          showIds.forEach(id => {
            const t = state.timers[id];
            if (t) updateCardText(id, t, state);
          });

          // Snap to enter position (below, invisible) with no transition
          stage.querySelectorAll('.display').forEach(d => {
            d.classList.remove('text-fading');
            d.classList.add('text-entering');
          });
          void stage.getBoundingClientRect();
          stage.querySelectorAll('.display').forEach(d => {
            d.classList.remove('text-entering');
          });
          stage.querySelectorAll('.role-label, .sub-label, .time').forEach(el => {
            el.style.transition = 'opacity 0.25s ease-out, transform 0.25s ease-out';
          });
          setTimeout(() => {
            stage.querySelectorAll('.role-label, .sub-label, .time').forEach(el => {
              el.style.transition = '';
            });
            _fadePending = false;
          }, 280);
        }, 220);

        return;
      }

      stage.className = 'stage ' + (multiMode && n > 1 ? 'multi' : 'single');
      if (multiMode && n >= 3) stage.classList.add('multi3up');

      // Normal tick — just update text
      showIds.forEach(id => {
        const t = state.timers[id];
        if (t) updateCardText(id, t, state);
      });

    } catch(e) {}
  }

  // storage event fires immediately when another tab/window writes localStorage
  window.addEventListener('storage', (e) => {
    if (e.key === 'test_courtTimerState') loadAndRender();
  });
  // Fallback poll — slower since storage events handle most updates
  setInterval(loadAndRender, 250);
  loadAndRender();

  function reportSize() {
    const first = document.querySelector('.display');
    if (!first) return;
    const h = first.getBoundingClientRect().height;
    const w = document.getElementById('stage').getBoundingClientRect().width;
    document.getElementById('sizer').textContent =
      Math.round(w + 120) + ' × ' + Math.round(h + 80);
  }
  setInterval(reportSize, 1000);
  setTimeout(reportSize, 600);
</script>
<script>
  // Auto-update: keep this OBS source on the latest version (offline cache + reload on new release)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.update();
      window.addEventListener('focus', () => { try { reg.update(); } catch (e) {} });
    }).catch(() => {});
    let _r = false;
    const _wc = !!navigator.serviceWorker.controller;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!_wc || _r) return; _r = true; window.location.reload();
    });
  }
</script>
</body>
</html>
